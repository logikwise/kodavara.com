# ============================================================
# KODAVARA — Docker Compose
# Usage:
#   Local dev:   docker compose up
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: kodavara-web:latest
    container_name: kodavara
    ports:
      - "8080:80"          # Local: http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.kodavara.description=Kodavara Static Website"
      - "com.kodavara.version=1.0"
      - "traefik.enable=true"
      - "traefik.http.routers.kodavara.rule=Host(`kodavara.com`)"
      - "traefik.http.routers.kodavara-secure.rule=Host(`kodavara.com`)"
