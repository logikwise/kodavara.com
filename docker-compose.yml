# ============================================================
# KODAVARA — Docker Compose (single file, production-ready)
# Usage:
#   docker compose up -d
#   docker compose pull && docker compose up -d   # update
#   docker compose down                            # stop
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/logikwise/kodavara-web:latest
    container_name: kodavara
    ports:
      - "80:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.kodavara.description=Kodavara Static Website"
      - "com.kodavara.version=1.0"
      - "traefik.enable=true"
      - "traefik.http.routers.kodavara.rule=Host(`kodavara.com`)"
      - "traefik.http.routers.kodavara-secure.rule=Host(`kodavara.com`)"
