server {
    listen 80;
    server_name kodavara.com www.kodavara.com localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Charset ──────────────────────────────────────────────
    charset utf-8;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Cache static assets ───────────────────────────────────
    location ~* \.(css|js|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── HTML — no cache (so updates deploy instantly) ─────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Clean URLs — try .html extension automatically ────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 ───────────────────────────────────────────
    error_page 404 /index.html;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
